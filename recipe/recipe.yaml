schema_version: 1

context:
  name: e3sm-tools
  version: "3.0.2"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  - url: https://github.com/E3SM-Project/E3SM/archive/v${{ version }}.tar.gz
    sha256: f307789973d5696175bccb3f1b35d9a326a94d45340aeeb1260938ad1d0a715c
    patches:
      - 0001-fix-boz-erros-in-mksurfdata_map-build.patch

build:
  number: 3
  skip: not linux

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('fortran') }}
    - ${{ stdlib("c") }}
    - cmake
    - make
  host:
    - python
    - libcurl
    - netcdf-fortran
    - netcdf-fortran * nompi_*
  run:
    - python
    - numba
    - numpy
    - xarray

tests:
  - script:
      - test -f "${PREFIX}/bin/cube_to_target"
      - test -f "${PREFIX}/bin/interpinic"
      - test -f "${PREFIX}/bin/mksurfdata_map"
      - generate_domain_files_E3SM.py --help
      - mkatmsrffile.py --help

about:
  license: BSD-3-Clause
  license_file: LICENSE
  summary: Tools needed to integrate new meshes into the Energy Exascale Earth System Model (E3SM)
  homepage: https://e3sm.org
  repository: https://github.com/E3SM-Project/E3SM
  documentation: https://acme-climate.atlassian.net/wiki/spaces/DOC/pages/872579110/Running+E3SM+on+New+Atmosphere+Grids

extra:
  recipe-maintainers:
    - andrewdnolan
    - xylar
